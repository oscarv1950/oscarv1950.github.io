<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Study App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════════ -->
  <header class="app-header">
    <div class="header-left">
      <span class="app-logo">📖</span>
      <span class="app-title">English Study</span>
    </div>
    <div class="header-right">
      <!-- Dark mode toggle -->
      <label class="theme-toggle" title="Toggle dark mode">
        <input type="checkbox" id="themeToggle" />
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
        <span class="toggle-label">🌙</span>
      </label>

      <!-- Dictionary button (floating-style in header on desktop) -->
      <button class="btn-dict-open" id="btnOpenDict" title="Open My Dictionary">
        📚 <span class="dict-count" id="dictCount">0</span>
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════
       MAIN LAYOUT
  ═══════════════════════════════════════════════ -->
  <main class="app-main">

    <!-- ── LEFT PANEL: Config & Input ── -->
    <section class="panel panel-config" id="panelConfig">
      <h2 class="panel-title">Configuration</h2>

      <!-- API Key -->
      <div class="field-group">
        <label class="field-label" for="apiKey">OpenRouter API Key</label>
        <input
          type="password"
          id="apiKey"
          class="field-input"
          placeholder="sk-or-..."
          autocomplete="off"
        />
      </div>

      <!-- Level selector -->
      <div class="field-group">
        <label class="field-label" for="levelSelect">CEFR Level</label>
        <select id="levelSelect" class="field-input">
          <option value="A1">A1 – Beginner</option>
          <option value="A2">A2 – Elementary</option>
          <option value="B1">B1 – Intermediate</option>
          <option value="B2" selected>B2 – Upper-Intermediate</option>
          <option value="C1">C1 – Advanced</option>
          <option value="C2">C2 – Proficiency</option>
        </select>
      </div>

      <!-- Model selector -->
      <div class="field-group">
        <label class="field-label" for="modelSelect">Model</label>
        <div class="model-row">
          <select id="modelSelect" class="field-input">
            <option value="">— fetch free models —</option>
          </select>
          <button class="btn-secondary" id="btnFetchModels" title="Load free models">⟳</button>
        </div>
        <span class="field-hint" id="modelStatus"></span>
      </div>

      <!-- Text input -->
      <div class="field-group">
        <label class="field-label" for="textInput">English text to analyze</label>
        <textarea
          id="textInput"
          class="field-textarea"
          rows="6"
          placeholder="Paste any English text here…"
        ></textarea>
      </div>

      <button class="btn-primary" id="btnAnalyze">
        <span class="btn-text">Analyze Text</span>
        <span class="btn-spinner" hidden>⏳</span>
      </button>

      <!-- Error banner -->
      <div class="error-banner" id="errorBanner" hidden>
        <span class="error-icon">⚠️</span>
        <span class="error-msg" id="errorMsg"></span>
      </div>
    </section>

    <!-- ── RIGHT PANEL: Output ── -->
    <section class="panel panel-output" id="panelOutput">

      <!-- Category legend / filters -->
      <div class="legend-bar" id="legendBar" hidden>
        <span class="legend-label">Filter:</span>
        <div class="legend-btns" id="legendBtns">
          <!-- Populated dynamically -->
        </div>
      </div>

      <!-- Analyzed text container -->
      <div class="text-display" id="textDisplay">
        <p class="placeholder-msg">Your analyzed text will appear here.</p>
      </div>

    </section>
  </main>

  <!-- ═══════════════════════════════════════════════
       MODAL — Word Detail
  ═══════════════════════════════════════════════ -->
  <div class="modal-overlay" id="wordModal" role="dialog" aria-modal="true" aria-label="Word details" hidden>
    <div class="modal-box">
      <button class="modal-close" id="wordModalClose" aria-label="Close">✕</button>

      <div class="modal-header">
        <span class="modal-word" id="mWord"></span>
        <span class="modal-ipa" id="mIPA"></span>
        <span class="modal-cat-badge" id="mCatBadge"></span>
      </div>

      <div class="modal-section">
        <span class="modal-section-label">Translation</span>
        <p id="mTranslation"></p>
      </div>

      <div class="modal-section">
        <span class="modal-section-label">Definition</span>
        <p id="mDefinition"></p>
      </div>

      <div class="modal-section">
        <span class="modal-section-label">Synonyms</span>
        <p id="mSynonyms"></p>
      </div>

      <div class="modal-section">
        <span class="modal-section-label">Examples</span>
        <ul id="mExamples"></ul>
      </div>

      <button class="btn-dict-toggle" id="btnDictToggle"></button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       MODAL — Dictionary
  ═══════════════════════════════════════════════ -->
  <div class="modal-overlay" id="dictModal" role="dialog" aria-modal="true" aria-label="My Dictionary" hidden>
    <div class="modal-box modal-box--dict">
      <button class="modal-close" id="dictModalClose" aria-label="Close">✕</button>
      <h2 class="modal-dict-title">📚 My Dictionary</h2>
      <div class="dict-grid" id="dictGrid">
        <!-- Populated dynamically -->
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
