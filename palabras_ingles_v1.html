<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palabras Inglés - Repaso</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .app { max-width: 520px; width: 100%; background: white; border-radius: 16px; padding: 1.5rem; box-shadow: 0 2px 16px rgba(0,0,0,0.08); }
  h1 { font-size: 17px; font-weight: 500; color: #1a1a1a; margin-bottom: 1rem; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; float: right; margin-top: 2px; }
  .badge-all { background: #dbeafe; color: #1e40af; }
  .badge-weak { background: #fee2e2; color: #991b1b; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1.25rem; }
  .stat { background: #f9f9f7; border-radius: 8px; padding: .75rem; text-align: center; }
  .stat-n { font-size: 22px; font-weight: 500; }
  .stat-l { font-size: 12px; color: #666; margin-top: 2px; }
  .word-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; position: relative; cursor: pointer; }
  .word-box:hover { border-color: #ccc; }
  .word-shown { font-size: 42px; font-weight: 500; color: #1a1a1a; letter-spacing: 2px; }
  .feedback { position: absolute; right: 20px; font-size: 32px; }
  .speak-icon { position: absolute; right: 12px; top: 10px; font-size: 20px; color: #888; cursor: pointer; border: none; background: none; padding: 4px 8px; }
  .speak-icon:hover { color: #333; }
  .input-row { display: flex; gap: 10px; margin-bottom: .75rem; }
  .input-row input { flex: 1; font-size: 22px; text-align: center; letter-spacing: 2px; border-radius: 8px; border: 1px solid #d1d5db; padding: 10px; outline: none; color: #1a1a1a; }
  .input-row input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px #eff6ff; }
  .btn { border: 1px solid #d1d5db; background: white; color: #1a1a1a; border-radius: 8px; padding: 10px 16px; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
  .btn:hover { background: #f9f9f7; }
  .btn-primary { background: #1d4ed8; color: white; border-color: #1d4ed8; }
  .btn-primary:hover { background: #1e40af; }
  .btn-danger { background: #fef2f2; color: #991b1b; border-color: #fca5a5; }
  .btn-danger:hover { background: #fee2e2; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .hint { font-size: 12px; color: #9ca3af; text-align: center; margin-bottom: 1rem; min-height: 16px; }
  .hint-ok { color: #15803d; }
  .hint-err { color: #991b1b; }
  .hint-info { color: #6b7280; font-size: 11px; }
  .panel { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1rem 1.25rem; margin-top: 1rem; }
  .panel-title { font-size: 14px; font-weight: 500; color: #666; margin-bottom: .75rem; display: flex; justify-content: space-between; align-items: center; }
  .grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 4px 10px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 13px; font-weight: 500; border: 1px solid; cursor: default; }
  .chip-ok { background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
  .chip-err { background: #fef2f2; color: #991b1b; border-color: #fca5a5; }
  .chip-none { background: #f9f9f7; color: #6b7280; border-color: #e5e7eb; }
</style>
</head>
<body>
<div class="app">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <h1>Palabras inglés</h1>
    <span id="badge" class="badge badge-all">Todas las palabras</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="stat-ok" style="color:#15803d">0</div><div class="stat-l">Aprendidas</div></div>
    <div class="stat"><div class="stat-n" id="stat-err" style="color:#991b1b">0</div><div class="stat-l">Por repasar</div></div>
    <div class="stat"><div class="stat-n" id="stat-streak">0</div><div class="stat-l">Racha</div></div>
  </div>

  <div class="word-box" id="word-box" onclick="repeatSpeak()">
    <span class="word-shown" id="word-shown" style="opacity:0">?</span>
    <span class="feedback" id="feedback"></span>
    <button class="speak-icon" onclick="event.stopPropagation();repeatSpeak()" title="Repetir">🔊</button>
  </div>

  <div class="input-row">
    <input type="text" id="answer" placeholder="escribe la palabra..." autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="btn btn-primary" onclick="check()">✓ Verificar</button>
    <button class="btn" onclick="nextRound()">→</button>
  </div>
  <p class="hint" id="hint">Pulsa "Pronunciar" para comenzar</p>

  <div class="controls">
    <button class="btn btn-primary" onclick="startOrRepeat()">🔊 Pronunciar</button>
    <button class="btn btn-danger" onclick="modeWeak()">↺ Repasar débiles</button>
    <button class="btn" onclick="modeAll()">⊞ Todas</button>
  </div>

  <div class="panel">
    <div class="panel-title">
      <span>Progreso — 50 palabras</span>
      <button class="btn" style="padding:3px 10px;font-size:12px" onclick="toggleGrid()">Ocultar</button>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="panel" id="weak-panel" style="display:none;margin-top:.75rem">
    <div class="panel-title" style="color:#991b1b">
      <span>⚠ Palabras para repasar</span>
      <button class="btn" style="padding:3px 10px;font-size:12px" onclick="document.getElementById('weak-panel').style.display='none'">Cerrar</button>
    </div>
    <div class="grid" id="weak-grid"></div>
  </div>
</div>

};


const state = {
  current: null, mode: 'all',
  learned: {}, wrong: {}, streak: 0,
  revealed: false, gridOpen: true, started: false
};
WORDS.forEach(w => { state.learned[w.w] = 0; state.wrong[w.w] = 0; });

let currentAudio = null;
function speak(word) {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  const src = AUDIO_DATA[word];
  if (!src) return;
  currentAudio = new Audio(src);
  currentAudio.play().catch(e => console.warn('Audio error:', e));
}

function weighted() {
  const pool = [];
  WORDS.forEach(({w}) => {
    const wt = state.wrong[w] > 0 ? 1 + state.wrong[w] * 3 : 1;
    for (let i = 0; i < wt; i++) pool.push(w);
  });
  return pool[Math.floor(Math.random() * pool.length)];
}

function weakWords() {
  return WORDS.filter(({w}) => state.wrong[w] > 0)
              .sort((a,b) => state.wrong[b.w] - state.wrong[a.w]);
}

function pickNext() {
  let word;
  if (state.mode === 'weak') {
    const wl = weakWords();
    if (!wl.length) { modeAll(); return; }
    const pool = [];
    wl.forEach(({w}) => { for (let i = 0; i < 1 + state.wrong[w]*2; i++) pool.push(w); });
    word = pool[Math.floor(Math.random() * pool.length)];
  } else {
    word = weighted();
  }
  state.current = word;
  state.revealed = false;
  document.getElementById('word-shown').style.opacity = '0';
  document.getElementById('feedback').textContent = '';
  document.getElementById('answer').value = '';
  document.getElementById('hint').className = 'hint';
  document.getElementById('hint').textContent = 'Escucha y escribe la palabra';
  document.getElementById('answer').focus();
  speak(word);
}

function check() {
  if (state.revealed) { nextRound(); return; }
  const input = document.getElementById('answer').value.trim().toLowerCase();
  if (!input) { document.getElementById('hint').textContent = 'Escribe una palabra'; return; }

  state.revealed = true;
  const correct = input === state.current.toLowerCase();
  const wordObj = WORDS.find(x => x.w === state.current);

  document.getElementById('word-shown').style.opacity = '1';
  document.getElementById('word-shown').textContent = state.current;
  document.getElementById('feedback').textContent = correct ? '✅' : '❌';

  const hintEl = document.getElementById('hint');
  if (correct) {
    state.learned[state.current]++;
    state.streak++;
    hintEl.className = 'hint hint-ok';
    hintEl.innerHTML = `¡Correcto! Era "<strong>${state.current}</strong>" (${wordObj.cat}) → ${wordObj.tr}. Pulsa → para continuar.`;
  } else {
    state.wrong[state.current]++;
    state.streak = 0;
    hintEl.className = 'hint hint-err';
    hintEl.innerHTML = `Era "<strong>${state.current}</strong>" (${wordObj.cat}) → ${wordObj.tr}. ¡Sigue practicando!`;
  }
  updateUI();
}

function nextRound() {
  if (!state.started) { startOrRepeat(); return; }
  if (!state.revealed) check();
  else pickNext();
}

function startOrRepeat() {
  state.started = true;
  if (!state.current || state.revealed) pickNext();
  else speak(state.current);
}

function repeatSpeak() {
  if (state.current) speak(state.current);
}

function modeAll() {
  state.mode = 'all';
  document.getElementById('badge').className = 'badge badge-all';
  document.getElementById('badge').textContent = 'Todas las palabras';
  pickNext();
}

function modeWeak() {
  state.mode = 'weak';
  document.getElementById('badge').className = 'badge badge-weak';
  document.getElementById('badge').textContent = 'Modo: palabras débiles';
  document.getElementById('weak-panel').style.display = 'block';
  updateUI();
  pickNext();
}

function toggleGrid() {
  state.gridOpen = !state.gridOpen;
  document.getElementById('grid').style.display = state.gridOpen ? 'flex' : 'none';
}

function updateUI() {
  const learnedC = WORDS.filter(({w}) => state.learned[w] > 0 && state.wrong[w] === 0).length;
  document.getElementById('stat-ok').textContent = learnedC;
  document.getElementById('stat-err').textContent = weakWords().length;
  document.getElementById('stat-streak').textContent = state.streak;

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  WORDS.forEach(({w}) => {
    const d = document.createElement('div');
    d.className = 'chip ' + (state.wrong[w] > 0 ? 'chip-err' : state.learned[w] > 0 ? 'chip-ok' : 'chip-none');
    d.textContent = w;
    d.title = state.wrong[w] > 0 ? `Errores: ${state.wrong[w]}` : state.learned[w] > 0 ? `Aciertos: ${state.learned[w]}` : 'Sin repasar';
    grid.appendChild(d);
  });

  const wg = document.getElementById('weak-grid');
  wg.innerHTML = '';
  const wl = weakWords();
  if (!wl.length) {
    wg.innerHTML = '<p style="font-size:13px;color:#666">¡Sin errores aún!</p>';
  } else {
    wl.forEach(({w}) => {
      const d = document.createElement('div');
      d.className = 'chip chip-err';
      d.textContent = w;
      d.title = `Errores: ${state.wrong[w]}`;
      wg.appendChild(d);
    });
  }
}

document.getElementById('answer').addEventListener('keydown', e => {
  if (e.key === 'Enter') { if (!state.revealed) check(); else nextRound(); }
});

updateUI();
